<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LURAX JOKI | MULTI-GAME SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes glow { 0% { box-shadow: 0 0 5px #ff0000; } 50% { box-shadow: 0 0 25px #ff0000; } 100% { box-shadow: 0 0 5px #ff0000; } }
        body { background: #050505; color: #fff; font-family: 'Arial Black', sans-serif; scroll-behavior: smooth; }
        .lurax-card { background: rgba(15, 15, 15, 0.95); border: 1px solid #333; border-radius: 25px; transition: 0.3s; }
        .active-tab { color: #ff0000; border-bottom: 4px solid #ff0000; transform: scale(1.1); }
        .discount-badge { background: #ff0000; color: white; font-size: 10px; padding: 2px 8px; border-radius: 5px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <audio id="astaTheme" loop><source src="https://www.mboxdrive.com/Black%20Catcher.mp3" type="audio/mpeg"></audio>

    <nav class="flex justify-between items-center mb-10 pb-5 border-b border-white/10">
        <h1 class="text-3xl font-black italic">LURAX <span class="text-red-600">JOKI</span></h1>
        <button onclick="toggleMusic()" class="text-red-600 text-2xl"><i id="musicIcon" class="fas fa-play-circle"></i></button>
    </nav>

    <div class="max-w-xl mx-auto lurax-card p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-red-600 blur-[80px] opacity-20"></div>
        
        <div class="flex justify-center gap-8 mb-10">
            <button onclick="setGame('ML')" id="tabML" class="active-tab font-black italic text-lg transition">MOBILE LEGENDS</button>
            <button onclick="setGame('BS')" id="tabBS" class="font-black italic text-lg transition opacity-50">BLOOD STRIKE</button>
        </div>

        <div class="space-y-6">
            <div>
                <label id="labelRank" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Target Rank</label>
                <select id="rankSelect" onchange="calculate()" class="w-full bg-zinc-900 border-2 border-zinc-800 p-4 rounded-xl text-white font-bold outline-none focus:border-red-600"></select>
            </div>

            <div>
                <label id="labelQty" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Jumlah Bintang/Tier</label>
                <input type="number" id="starInput" oninput="calculate()" placeholder="0" class="w-full bg-zinc-900 border-2 border-zinc-800 p-4 rounded-xl text-white font-bold text-2xl outline-none focus:border-red-600">
            </div>

            <div class="bg-black p-6 rounded-2xl border border-red-900/50 text-center">
                <p class="text-[10px] text-zinc-500 font-bold uppercase mb-1">Total Biaya</p>
                <div id="priceDisplay" class="text-4xl font-black italic text-white tracking-tighter">Rp 0</div>
                <div id="discountInfo" class="mt-2 hidden">
                    <span class="discount-badge" id="discountText">DISKON 0%</span>
                    <p id="originalPrice" class="text-xs text-zinc-600 line-through mt-1"></p>
                </div>
            </div>

            <button onclick="order()" class="w-full bg-red-600 hover:bg-white hover:text-red-600 py-5 rounded-2xl font-black text-xl transition-all shadow-lg shadow-red-900/30">
                TEBAS SEKARANG! ⚔️
            </button>
        </div>
    </div>

    <footer class="text-center mt-20 opacity-30">
        <p class="text-[10px] tracking-[0.5em] font-bold uppercase">LURAX JOKI | OWNER: CAPTAIN CALEB</p>
    </footer>

    <script>
        let currentGame = 'ML';
        const config = {
            ML: { label: "Target Rank ML", qty: "Jumlah Bintang", options: [{n:"EPIC",p:5000},{n:"LEGEND",p:8000},{n:"MYTHIC",p:15000},{n:"IMMORTAL",p:25000}] },
            BS: { label: "Target Rank BS", qty: "Jumlah Tier", options: [{n:"IRON-SILVER",p:15000},{n:"SILVER-GOLD",p:30000},{n:"GOLD-PLAT",p:50000},{n:"PLAT-DIAMOND",p:80000},{n:"MASTER-LEGEND",p:200000}] }
        };

        function setGame(g) {
            currentGame = g;
            document.getElementById('tabML').className = g === 'ML' ? 'active-tab font-black italic text-lg' : 'font-black italic text-lg opacity-50';
            document.getElementById('tabBS').className = g === 'BS' ? 'active-tab font-black italic text-lg' : 'font-black italic text-lg opacity-50';
            document.getElementById('labelRank').innerText = config[g].label;
            document.getElementById('labelQty').innerText = config[g].qty;
            const sel = document.getElementById('rankSelect');
            sel.innerHTML = '<option value="0">-- PILIH --</option>';
            config[g].options.forEach(o => sel.innerHTML += `<option value="${o.p}">${o.n}</option>`);
            calculate();
        }

        function calculate() {
            let base = document.getElementById('rankSelect').value * document.getElementById('starInput').value;
            let disc = 0;
            let final = base;

            if (base >= 200000) { disc = 0.15; }
            else if (base >= 100000) { disc = 0.10; }

            final = base - (base * disc);

            const disp = document.getElementById('priceDisplay');
            const info = document.getElementById('discountInfo');
            
            disp.innerText = "Rp " + Math.floor(final).toLocaleString('id-ID');
            
            if (disc > 0) {
                info.classList.remove('hidden');
                document.getElementById('discountText').innerText = `DISKON IBLIS ${disc*100}%`;
                document.getElementById('originalPrice').innerText = "Rp " + base.toLocaleString('id-ID');
            } else {
                info.classList.add('hidden');
            }
        }

        function order() {
            const r = document.getElementById('rankSelect').options[document.getElementById('rankSelect').selectedIndex].text;
            const q = document.getElementById('starInput').value;
            const p = document.getElementById('priceDisplay').innerText;
            if (q <= 0 || r.includes('--')) return alert("Isi Target Dulu!");
            const msg = `🔥 ORDER LURAX JOKI 🔥\nGame: ${currentGame}\nRank: ${r}\nQty: ${q}\nTotal: ${p}\n\nGAS TEBAS!`;
            window.open(`https://wa.me/6288902072245?text=${encodeURIComponent(msg)}`, '_blank');
        }

        const audio = document.getElementById('astaTheme');
        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('musicIcon').className = 'fas fa-pause-circle'; }
            else { audio.pause(); document.getElementById('musicIcon').className = 'fas fa-play-circle'; }
        }
        document.body.addEventListener('click', () => { if(audio.paused) toggleMusic(); }, {once:true});
        setGame('ML');
    </script>
</body>
</html>
