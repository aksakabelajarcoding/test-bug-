<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LURAX VIP | SUPREME SONIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div id="particles-js"></div>
    <canvas id="introCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>

    <div id="intro-overlay">
        <h1 class="font-vip text-3xl md:text-5xl neon-text italic mb-8">LURAX<span class="text-red-600">VIP</span></h1>
        <div class="relative group">
            <div class="absolute -inset-4 bg-red-600 opacity-20 blur-xl group-hover:opacity-40 transition animate-pulse"></div>
            <i class="fas fa-skull-crossbones text-white text-6xl relative z-10"></i>
        </div>
        <p class="mt-12 text-[10px] tracking-[8px] text-zinc-600 font-bold uppercase animate-pulse">Slash Screen to Authenticate ⚔️</p>
    </div>

    <div id="fake-notif" class="fake-notif">
        <div class="flex items-center gap-3">
            <div class="bg-red-600 p-2 rounded-lg animate-pulse">
                <i class="fas fa-shopping-cart text-white text-xs"></i>
            </div>
            <div>
                <p id="notif-user" class="text-[10px] font-black text-white"></p>
                <p id="notif-msg" class="text-[8px] text-zinc-400 uppercase tracking-widest"></p>
            </div>
        </div>
    </div>

    <audio id="astaTheme" loop><source src="https://www.mboxdrive.com/Black%20Catcher.mp3" type="audio/mpeg"></audio>
    <audio id="notifSound"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

    <div id="main-content" class="pt-16 px-6">
        <div class="max-w-6xl mx-auto">
            <header class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
                <div>
                    <span class="text-red-600 font-black text-[10px] tracking-[5px] uppercase">Authorized Access</span>
                    <h2 class="font-vip text-5xl md:text-7xl neon-text italic mt-2" id="typing-title"></h2>
                </div>
                <div class="text-right hidden md:block">
                    <p class="text-zinc-600 text-[9px] font-bold uppercase tracking-widest">Server: ID-WEST-01</p>
                    <p class="text-zinc-400 text-[10px] font-black italic" id="live-clock"></p>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-6">
                    <div class="warning-strip">
                        <div class="warning-text">
                            ⚠️ ALERT: HIGH TRAFFIC // SLOTS: <span class="slot-counter">03</span> // PRIORITY EXECUTION // ⚠️
                        </div>
                    </div>

                    <div class="vip-card p-2 sql-container overflow-x-auto border-l-4 border-red-600">
                        <table class="sql-table">
                            <thead><tr><th>#REF_ID</th><th>MISSION</th><th>TIMESTAMP</th><th>STATUS</th></tr></thead>
                            <tbody id="sql-body">
                                <tr><td>0x8F2D</td><td class="font-black italic text-white">MLBB IMMORTAL ⭐100</td><td>09:15</td><td><span class="status-badge status-active">EXECUTING</span></td></tr>
                                <tr><td>0x3E11</td><td class="font-black italic text-white">BS LEGEND TIER</td><td>08:45</td><td><span class="status-badge status-complete">SUCCESS</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="vip-card p-8 border-r-4 border-red-600 h-fit">
                    <div class="flex gap-4 mb-8 border-b border-white/5 pb-2">
                        <button onclick="setGame('ML')" id="tabML" class="font-vip text-[10px] text-red-600">MLBB</button>
                        <button onclick="setGame('BS')" id="tabBS" class="font-vip text-[10px] opacity-30">BSTRIKE</button>
                    </div>
                    <div class="space-y-5">
                        <select id="rankSelect" onchange="run()" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-xs font-bold text-white"></select>
                        <input type="number" id="starInput" oninput="run()" placeholder="QTY" class="w-full bg-black border border-zinc-800 p-4 rounded-xl font-black text-2xl text-white">
                        <div class="bg-black p-8 rounded-3xl text-center border border-red-950">
                            <p class="text-[9px] text-zinc-500 font-black uppercase mb-2">Sync Price</p>
                            <div id="total" class="font-vip text-3xl neon-text">Rp 0</div>
                        </div>
                        <button onclick="order()" class="w-full py-5 rounded-2xl btn-order font-vip text-[11px] italic font-black">EXECUTE MISSION</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
